[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
remappings = [
  "forge-std/=lib/forge-std/src/",
  "@openzeppelin/=node_modules/@openzeppelin/",
]

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
